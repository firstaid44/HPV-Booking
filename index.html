/* ============================================================
   JSONP GET (ข้ามปัญหา CORS ได้เลย)
   ============================================================ */
function jsonpGet(baseUrl, params={}) {
  return new Promise((resolve, reject) => {
    const cbName = "_cb" + Date.now() + Math.random().toString(36).slice(2,6);
    const timeout = setTimeout(()=>{
      delete window[cbName];
      if(script.parentNode) script.parentNode.removeChild(script);
      reject(new Error("หมดเวลา — ตรวจสอบ Apps Script URL และ deployment"));
    }, 15000);

    window[cbName] = (data) => {
      clearTimeout(timeout);
      delete window[cbName];
      if(script.parentNode) script.parentNode.removeChild(script);
      if(data && data.status==="error") reject(new Error(data.message));
      else resolve(data);
    };

    const qs = Object.entries({...params, callback:cbName}).map(([k,v])=>k+"="+encodeURIComponent(v)).join("&");
    const script = document.createElement("script");
    script.src = baseUrl + "?" + qs;
    script.onerror = ()=>{
      clearTimeout(timeout);
      delete window[cbName];
      reject(new Error("โหลดสคริปต์ล้มเหลว — URL อาจผิด หรือ Apps Script ยังไม่ deploy"));
    };
    document.head.appendChild(script);
  });
}

/* ============================================================
   POST (ใช้ text/plain เพื่อข้าม CORS preflight)
   ============================================================ */
async function apiPost(url, payload) {
  const res = await fetch(url, {
    method:"POST", redirect:"follow",
    headers:{"Content-Type":"text/plain"},
    body: JSON.stringify(payload)
  });
  if (!res.ok) throw new Error("HTTP " + res.status);
  const data = await res.json();
  if (data.status==="error") throw new Error(data.message);
  return data;
}

const THM_F = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];

const NOW    = new Date(2026,3,24);

function parseBE(s){if(!s)return null;const p=s.trim().split("/");if(p.length!==3)return null;let d=+p[0],m=+p[1],y=+p[2];if(isNaN(d)||isNaN(m)||isNaN(y))return null;if(y<100)y+=2500;return new Date(y-543,m-1,d);}
const fmtBE     = d=>d?`${d.getDate()} ${THM_S[d.getMonth()]} ${d.getFullYear()+543}`:"";
const fmtBEFull = d=>d?`${d.getDate()} ${THM_F[d.getMonth()]} ${d.getFullYear()+543}`:"";
const dKey      = d=>d.toISOString().split("T")[0];
const fmtId     = id=>id.replace(/(\d)(\d{4})(\d{5})(\d{2})(\d)/,"$1-$2-$3-$4-$5");

function isBookable(d){return(d.getDay()===1||d.getDay()===5)&&!HOLIDAYS.has(dKey(d));}
function nextDates(n=16){const res=[],cur=new Date(NOW);cur.setDate(cur.getDate()+1);while(res.length<n){if(isBookable(cur))res.push(new Date(cur));cur.setDate(cur.getDate()+1);}return res;}
function checkElig(p){
  const age=parseInt(p.age)||0;
  if(age<30||age>60)return{ok:false,col:"red",icon:"✕",reason:`อายุ ${age} ปี ไม่อยู่ในเกณฑ์ (30–60 ปี)`};
  const sd=(p["วันคัดกรอง"]||p.screendate||"").trim();
  if(!sd)return{ok:true,col:"green",icon:"✓",reason:"ยังไม่เคยรับการตรวจ HPV Self-test"};
  const last=parseBE(sd);
  if(!last)return{ok:true,col:"green",icon:"✓",reason:"ไม่มีข้อมูลการตรวจเดิม"};
  const yrs=(NOW-last)/(365.25*24*3600*1000);
  if(yrs>=5)return{ok:true,col:"green",icon:"✓",reason:`ครบ 5 ปีแล้ว (ตรวจล่าสุด ${fmtBE(last)})`};
  const next=new Date(last);next.setFullYear(next.getFullYear()+5);
  return{ok:false,col:"amber",icon:"⏱",reason:`ยังไม่ครบ 5 ปี · ตรวจล่าสุด ${fmtBE(last)} · ครั้งถัดไป ${fmtBE(next)}`};
}

/* ============================================================

   ============================================================ */
function StatsTab({patients,bookings,onRefresh,lastSync}){
  const screened=useMemo(()=>patients.filter(p=>(p["วันคัดกรอง"]||"").trim()).length,[patients]);
  const pct=patients.length?Math.round(screened/patients.length*100):0;
  const byDate=useMemo(()=>{
    const m={};
    bookings.forEach(bk=>{
      const d=bk._dateLabel||bk["วันที่นัด"]||"ไม่ระบุวัน";
      const dk=bk._dk||d;
      if(!m[dk])m[dk]={label:d,dk,count:0,slots:{}};
      m[dk].count++;
      const t=bk.time||bk["เวลา"]||"";
      m[dk].slots[t]=(m[dk].slots[t]||0)+1;
    });
    return Object.values(m).sort((a,b)=>a.dk.localeCompare(b.dk));
  },[bookings]);
  return html`<div class="fade">
    <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div style=${{fontWeight:700,fontSize:16,color:C.textDk}}>สถิติการคัดกรอง</div>
      <button onClick=${onRefresh} style=${{background:C.tealLt,color:C.teal,border:"none",borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:4}}>
        <${Ico} name="refresh" size=${14} color=${C.teal}/> รีเฟรช
      </button>
    </div>
    ${lastSync&&html`<div style=${{fontSize:11,color:C.textLt,marginBottom:8,textAlign:"right"}}>อัปเดตล่าสุด: ${lastSync}</div>`}
    <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
      ${[{lbl:"เป้าหมายทั้งหมด",val:patients.length,col:C.textDk,bg:"white"},
         {lbl:"ตรวจแล้ว",val:screened,col:C.teal,bg:C.tealLt},
         {lbl:"ยังไม่ตรวจ",val:patients.length-screened,col:C.amber,bg:C.amberLt},
         {lbl:"จองคิวแล้ว",val:bookings.length,col:"#7C3AED",bg:"#EDE9FE"}]
        .map(c=>html`<div key=${c.lbl} style=${{background:c.bg,borderRadius:14,padding:"12px 14px",boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
          <div style=${{fontSize:11,color:c.col,fontWeight:600,opacity:.8}}>${c.lbl}</div>
          <div style=${{fontSize:32,fontWeight:700,color:c.col,lineHeight:1.1}}>${c.val}</div>
        </div>`)}
    </div>
    <div style=${card}>
      <div style=${{display:"flex",justifyContent:"space-between",marginBottom:6}}>
        <span style=${{fontSize:13,color:C.textMd,fontWeight:600}}>ความคืบหน้าการตรวจ</span>
        <span style=${{fontSize:13,fontWeight:700,color:C.teal}}>${pct}%</span>
      </div>
      <div style=${{height:14,background:C.bg,borderRadius:7,overflow:"hidden",marginBottom:8}}>
        <div style=${{height:"100%",width:pct+"%",background:`linear-gradient(90deg,${C.teal},${C.tealMd})`,borderRadius:7}}/>
      </div>
      <div style=${{display:"flex",justifyContent:"space-between",fontSize:11,color:C.textLt}}>
        <span>ตรวจแล้ว ${screened} ราย</span><span>คงเหลือ ${patients.length-screened} ราย</span>
      </div>
    </div>
    ${bookings.length>0&&html`<div style=${card}>
      <div style=${{fontWeight:700,fontSize:14,color:C.textDk,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
        📅 สรุปการจองคิวรายวัน
        <span style=${{fontSize:12,background:"#EDE9FE",color:"#7C3AED",padding:"2px 8px",borderRadius:8,fontWeight:600}}>${bookings.length} ราย</span>
      </div>
      ${byDate.map(g=>html`<div key=${g.dk} style=${{marginBottom:12,paddingBottom:12,borderBottom:`1px solid ${C.border}`}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style=${{fontWeight:700,fontSize:13,color:C.textDk}}>${g.label}</div>
          <span style=${{background:C.tealLt,color:C.teal,fontSize:11,padding:"2px 10px",borderRadius:8,fontWeight:700}}>${g.count} คิว</span>
        </div>
        <div style=${{display:"flex",gap:6,flexWrap:"wrap"}}>
          ${Object.entries(g.slots).sort((a,b)=>a[0].localeCompare(b[0])).map(([t,n])=>html`
            <div key=${t} style=${{background:C.bg,borderRadius:8,padding:"4px 10px",textAlign:"center",minWidth:64}}>
              <div style=${{fontSize:12,fontWeight:700,color:C.teal}}>${t}</div>
              <div style=${{fontSize:10,color:C.textMd}}>${n}/${MAX_SLOT} คน</div>
              <div style=${{height:3,background:C.tealLt,borderRadius:2,marginTop:3,overflow:"hidden"}}><div style=${{height:"100%",width:(n/MAX_SLOT*100)+"%",background:C.teal,borderRadius:2}}/></div>
            </div>`)}
        </div>
      </div>`)}
    </div>`}
    <div style=${card}>
      <div style=${{fontWeight:700,fontSize:14,color:C.textDk,marginBottom:14}}>รายหมู่บ้าน</div>
      ${Object.entries(MOO_NAME).map(([moo,name])=>{
        const all=patients.filter(p=>String(p.moo||"").padStart(2,"0")===moo);
        const done=all.filter(p=>(p["วันคัดกรอง"]||"").trim());
        const p2=all.length?Math.round(done.length/all.length*100):0;
        const nd=all.length-done.length;
        const booked=bookings.filter(b=>(b.village||b["หมู่บ้าน"]||"").includes(name.split(" ")[0])||false);
        return html`<div key=${moo} style=${{marginBottom:14}}>
          <div style=${{display:"flex",justifyContent:"space-between",marginBottom:5,alignItems:"center"}}>
            <div style=${{fontSize:13,fontWeight:600,color:C.textDk}}>${name}</div>
            <div style=${{display:"flex",gap:6,alignItems:"center"}}>
              ${booked.length>0&&html`<span style=${{fontSize:10,padding:"2px 6px",borderRadius:6,background:"#EDE9FE",color:"#7C3AED",fontWeight:700}}>จอง ${booked.length}</span>`}
              <span style=${{fontSize:11,color:C.textMd}}>${done.length}/${all.length}</span>
              <span style=${{fontSize:10,padding:"2px 7px",borderRadius:8,background:nd>0?C.amberLt:C.greenLt,color:nd>0?C.amber:C.green,fontWeight:700}}>${nd>0?"รอ "+nd:"ครบ ✓"}</span>
            </div>
          </div>
          <div style=${{height:8,background:C.bg,borderRadius:4,overflow:"hidden"}}><div style=${{height:"100%",width:p2+"%",background:p2>=70?C.teal:p2>=40?C.tealMd:"#F59E0B",borderRadius:4}}/></div>
        </div>`;
      })}
    </div>
  </div>`;
}

/* ============================================================
   MAIN APP
   ============================================================ */
function App(){
  const [apiUrl,setApiUrl] = useState(localStorage.getItem(KEY_URL)||DEFAULT_URL);
  const [patients,setPatients] = useState([]);
  const [bookings,setBookings] = useState([]);
  const [slotMap,setSlotMap]   = useState({});
  const [loading,setLoading]   = useState(false);
  const [lastSync,setLastSync] = useState(null);
  const [tab,setTab]           = useState("book");
  const [isAdmin,setIsAdmin]   = useState(false);
  const [showLogin,setShowLogin]= useState(false);

  useEffect(()=>{
    try{const r=localStorage.getItem(KEY_ADM);if(r){const{expiry}=JSON.parse(r);if(Date.now()<expiry)setIsAdmin(true);else localStorage.removeItem(KEY_ADM);}}catch{}
    // bookings always fetched from Sheets (not localStorage)
    try{const cp=localStorage.getItem(KEY_PT);if(cp)setPatients(JSON.parse(cp));}catch{}
    // ฝัง URL เริ่มต้น
    if(!localStorage.getItem(KEY_URL)) localStorage.setItem(KEY_URL,DEFAULT_URL);
  },[]);

  // ---- fetch bookings only (fast, realtime) ----
  // ============================================================
  // แปลง raw JS Date string → วันที่ไทย พ.ศ. / เวลา HH:MM
  // รองรับ: "Thu Apr 27 2569 14:00:00 GMT+0700 (เวลาอินโดจีน) Sat Dec 30 1899..."
  // ============================================================
  const _TH_MON = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
                   "กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
  const _EN_MON = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,
                   Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  // แปลง "27 เมษายน 2569" → "2026-04-27" (ISO key ใช้เปรียบเทียบ slot)
  function parseTHDateToISO(s) {
    if (!s) return "";
    for (let mi=0; mi<_TH_MON.length; mi++) {
      const mth = _TH_MON[mi];
      if (!s.includes(mth)) continue;
      const re = new RegExp("(\d{1,2})\s+" + mth + "\s+(\d{4})");
      const hit = s.match(re);
      if (hit) {
        const day    = parseInt(hit[1]);
        const beYear = parseInt(hit[2]);
        const ceYear = beYear >= 2500 ? beYear - 543 : beYear;
        const d = new Date(ceYear, mi, day);
        return dKey(d); // "YYYY-MM-DD"
      }
    }
    return s;
  }

  function cleanDateStr(s) {
    if (!s) return "";
    s = String(s).trim();

    // ถ้ามีชื่อเดือนไทยอยู่แล้ว → ดึงเฉพาะ วันที่-เดือน-ปี
    if (_TH_MON.some(m => s.includes(m))) {
      for (const m of _TH_MON) {
        if (!s.includes(m)) continue;
        const re = new RegExp("(\d{1,2})\s+"+m+"\s+(\d{4})");
        const hit = s.match(re);
        if (hit) {
          const yr = parseInt(hit[2]);
          // ถ้าปีน้อยกว่า 2500 = ค.ศ. → บวก 543 เป็น พ.ศ.
          const beYr = yr < 2500 ? yr + 543 : yr;
          return hit[1]+" "+m+" "+beYr;
        }
      }
      return s.replace(/\s+/g," ").trim();
    }

    // raw JS Date string: "Thu Apr 27 YYYY HH:MM:SS GMT+0700..."
    // YYYY อาจเป็น ค.ศ. (2026) หรือ พ.ศ. (2569) ขึ้นกับ locale ของ browser/Apps Script
    const mDate = s.match(/(?:Mon|Tue|Wed|Thu|Fri|Sat|Sun)\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+(\d{1,2})\s+(\d{4})/i);
    if (mDate) {
      const mon = mDate[1].charAt(0).toUpperCase()+mDate[1].slice(1).toLowerCase();
      const day = parseInt(mDate[2]);
      const yr  = parseInt(mDate[3]);
      // ค.ศ. (< 2500) → บวก 543 เป็น พ.ศ. | พ.ศ. (>= 2500) → ใช้ได้เลย
      const beYr = yr < 2500 ? yr + 543 : yr;
      const mi   = _EN_MON[mon];
      if (mi !== undefined) return day+" "+_TH_MON[mi]+" "+beYr;
    }
    return s;
  }

  function cleanTimeStr(s) {
    if (!s) return "";
    s = String(s).trim();
    // HH:MM อยู่แล้ว
    if (/^\d{1,2}:\d{2}$/.test(s)) return s;

    // raw JS Date string — ตัด epoch 1899 ออก แล้วหา HH:MM จากวันที่จริง
    // "Thu Apr 27 2569 08:00:00 GMT+0700 (เวลาอินโดจีน) Sat Dec 30 1899 22:42:00 GMT+0700"
    // → เอาส่วนก่อน "Sat Dec 30 1899" หรือ "Sun Dec 30 1899"
    const stripped = s
      .replace(/(?:Sat|Sun)\s+Dec\s+30\s+1899.*$/i,"")
      .replace(/GMT[+-]\d{4}.*$/i,"")
      .replace(/\(.*?\)/g,"")
      .trim();

    // หา HH:MM จาก part ที่เหลือ (เช่น "Thu Apr 27 2569 08:00:00")
    const mTime = stripped.match(/(\d{1,2}):(\d{2})(?::\d{2})?/);
    if (mTime) return mTime[1].padStart(2,"0")+":"+mTime[2];

    // decimal fraction: 0.333... = 08:00
    const num = parseFloat(s);
    if (!isNaN(num) && num >= 0 && num < 1) {
      const tot = Math.round(num*1440);
      return String(Math.floor(tot/60)).padStart(2,"0")+":"+String(tot%60).padStart(2,"0");
    }
    return s;
  }

  function normaliseBooking(b){
    const idcard = String(b.idcard||b["เลขบัตรประชาชน"]||b["เลขบัตร"]||"").trim();
    const rawDate = b._dateLabel||b["วันที่นัด"]||b["วันที่จองคิว"]||b["วันนัด"]||"";
    const rawTime = b.time||b["เวลา"]||b["เวลาที่จองคิว"]||"";
    const dateLabel = cleanDateStr(String(rawDate));
    const time      = cleanTimeStr(String(rawTime));
    const name      = String(b.name||b["ชื่อ-นามสกุล"]||b["ชื่อ-สกุล"]||"").trim();
    const id        = String(b.id||b["id"]||b["เลขการจอง"]||b["รหัส"]||"").trim();
    return {...b,
      id, idcard, name,
      _dateLabel: dateLabel,
      _dk: parseTHDateToISO(dateLabel)||b._dk||dateLabel,
      _dayTh: b._dayTh||"",
      time,
      village: String(b.village||b["หมู่บ้าน"]||b["หมู่ที่"]||"").trim(),
    };
  }

  async function fetchBookings(silent=false){
    const url=localStorage.getItem(KEY_URL)||DEFAULT_URL;
    if(!url)return;
    try{
      const br=await jsonpGet(url,{action:"getBookings"});
      const bks=(br.bookings||[]).map(normaliseBooking).filter(b=>b.id&&b.id!=="undefined");
      setBookings(bks);rebuildSlots(bks);
      setLastSync(new Date().toLocaleTimeString("th-TH"));
    }catch(e){console.warn("fetchBookings error:",e.message);}
  }

  // ---- fetch patients + bookings (full) ----
  async function fetchAll(silent=false){
    const url=localStorage.getItem(KEY_URL)||DEFAULT_URL;
    if(!url)return;
    if(!silent)setLoading(true);
    try{
      const [pr,br]=await Promise.all([
        jsonpGet(url,{action:"getPatients"}),
        jsonpGet(url,{action:"getBookings"})
      ]);
      const pts=pr.patients||[];
      const bks=(br.bookings||[]).map(normaliseBooking).filter(b=>b.id&&b.id!=="undefined");
      setPatients(pts);setBookings(bks);rebuildSlots(bks);
      // cache patients only (bookings always from Sheets)
      localStorage.setItem(KEY_PT,JSON.stringify(pts));
      setLastSync(new Date().toLocaleTimeString("th-TH"));
    }catch(e){
      console.warn("fetchAll error:",e.message);
      // load patient cache on fail
      try{const cp=localStorage.getItem(KEY_PT);if(cp)setPatients(JSON.parse(cp));}catch{}
    }
    setLoading(false);
  }

  // initial load
  useEffect(()=>{if(apiUrl)fetchAll();},[apiUrl]);
  // auto-refresh bookings every 15s
  useEffect(()=>{
    if(!apiUrl)return;
    const t=setInterval(()=>fetchBookings(true),SYNC_MS);
    return()=>clearInterval(t);
  },[apiUrl]);

  function rebuildSlots(list){
    const m={};
    list.forEach(bk=>{
      // _dk ถูก normalise เป็น ISO "YYYY-MM-DD" แล้ว (ใน normaliseBooking)
      const dk=String(bk._dk||"").trim();
      const t=String(bk.time||bk["เวลา"]||"").trim();
      if(dk&&t) m[dk+"-"+t]=(m[dk+"-"+t]||0)+1;
    });
    setSlotMap(m);
  }
  function slotCount(dk,t){return slotMap[dk+"-"+t]||0;}
  function slotFull(dk,t,max){return slotCount(dk,t)>=max;}

  // Optimistic add: show immediately, then Sheets becomes source of truth on next sync
  function onAddBooking(bk,update=false){
    setBookings(prev=>{
      const u=update?prev.map(b=>b.id===bk.id?{...b,synced:true,targetOk:bk.targetOk}:b):[...prev,bk];
      rebuildSlots(u);return u;
    });
  }
  // Optimistic delete: remove locally, Sheets updated by API call
  async function onDeleteBooking(id){
    const url=localStorage.getItem(KEY_URL)||DEFAULT_URL;
    // อัปเดต UI ทันที (optimistic)
    setBookings(prev=>{const u=prev.filter(b=>String(b.id)!==String(id)&&String(b["id"])!==String(id));rebuildSlots(u);return u;});
    // เรียก API ลบจาก Google Sheets + ล้างคอลัมน์ P
    if(url){
      try{ await apiPost(url,{action:"deleteBooking",id}); }
      catch(e){ console.warn("deleteBooking API error:",e.message); }
    }
    // re-fetch ยืนยันผล
    setTimeout(()=>fetchBookings(true),1500);
  }
  function doLogin(pin){if(pin===ADMIN_PIN){localStorage.setItem(KEY_ADM,JSON.stringify({expiry:Date.now()+SESSION_H*3600*1000}));setIsAdmin(true);setShowLogin(false);return true;}return false;}
  function doLogout(){localStorage.removeItem(KEY_ADM);setIsAdmin(false);}
  function onSaveUrl(u){setApiUrl(u);}

  const screened=useMemo(()=>patients.filter(p=>(p["วันคัดกรอง"]||"").trim()).length,[patients]);
  // fetch fresh bookings when switching to admin tabs
  function handleTabSwitch(id){
    setTab(id);
    if(id==="list"||id==="stats") fetchBookings(true);
  }

  const TABS=[
    {id:"book",  icon:"calendar", lbl:"จองคิว",  admin:false},
    {id:"list",  icon:"list",     lbl:"รายการ",  admin:true},
    {id:"stats", icon:"chart",    lbl:"สถิติ",   admin:true},
    {id:"setup", icon:"settings", lbl:"ตั้งค่า", admin:true},
  ];

  function LockedScreen(){return html`<div style=${{textAlign:"center",padding:"60px 20px"}}>
    <div style=${{width:64,height:64,borderRadius:20,background:C.tealLt,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}><${Ico} name="lock" size=${28} color=${C.teal}/></div>
    <div style=${{fontWeight:700,fontSize:16,color:C.textDk}}>สำหรับแอดมินเท่านั้น</div>
    <div style=${{fontSize:13,color:C.textMd,marginTop:6,marginBottom:20}}>กรุณาเข้าสู่ระบบเพื่อดูข้อมูลส่วนนี้</div>
    <button onClick=${()=>setShowLogin(true)} style=${{background:C.teal,color:"white",border:"none",borderRadius:12,padding:"11px 28px",fontSize:14,fontWeight:700}}>เข้าสู่ระบบแอดมิน</button>
  </div>`;}

  return html`<div style=${{fontFamily:"inherit",background:C.bg,minHeight:"100vh"}}>
    <!-- HEADER -->
    <div style=${{background:`linear-gradient(135deg,${C.teal},${C.tealDk})`,padding:"14px 16px",boxShadow:"0 2px 12px rgba(13,148,136,.3)",position:"sticky",top:0,zIndex:50}}>
      <div style=${{display:"flex",alignItems:"center",gap:10}}>
        <div style=${{width:38,height:38,borderRadius:12,background:"rgba(255,255,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <${Ico} name="shield" size=${20} color="white"/>
        </div>
        <div style=${{flex:1}}>
          <div style=${{color:"white",fontWeight:700,fontSize:15}}>HPV Self-test จองคิว</div>
          <div style=${{color:"rgba(255,255,255,.75)",fontSize:11}}>${CENTER_NAME}</div>
        </div>
        ${isAdmin
          ?html`<div style=${{display:"flex",alignItems:"center",gap:6}}>
            <span style=${{background:"rgba(255,255,255,.2)",borderRadius:8,padding:"3px 8px",fontSize:11,color:"white",fontWeight:600}}>แอดมิน</span>
            <button onClick=${doLogout} style=${{background:"rgba(255,255,255,.15)",border:"none",borderRadius:8,padding:"5px 8px",display:"flex",cursor:"pointer"}}><${Ico} name="logout" size=${16} color="white"/></button>
          </div>`
          :html`<button onClick=${()=>setShowLogin(true)} style=${{background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.3)",borderRadius:10,padding:"6px 10px",display:"flex",alignItems:"center",gap:5,cursor:"pointer",color:"white",fontSize:12,fontWeight:600}}>
            <${Ico} name="lock" size=${14} color="white"/> แอดมิน
          </button>`
        }
      </div>
      <div style=${{display:"flex",gap:8,marginTop:12,overflowX:"auto",paddingBottom:2}}>
        ${[{lbl:"เป้าหมาย",val:patients.length},{lbl:"ตรวจแล้ว",val:screened},{lbl:"คงเหลือ",val:patients.length-screened},{lbl:"จองคิว",val:bookings.length}]
          .map(c=>html`<div key=${c.lbl} style=${{background:"rgba(255,255,255,.15)",borderRadius:10,padding:"5px 12px",minWidth:70,textAlign:"center",flexShrink:0}}>
            <div style=${{color:"rgba(255,255,255,.75)",fontSize:10,fontWeight:600}}>${c.lbl}</div>
            <div style=${{color:"white",fontWeight:700,fontSize:20,lineHeight:1.2}}>${c.val}</div>
          </div>`)}
        ${loading&&html`<div style=${{background:"rgba(255,255,255,.15)",borderRadius:10,padding:"5px 10px",display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
          <div style=${{width:12,height:12,border:"2px solid rgba(255,255,255,.4)",borderTopColor:"white",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
          <span style=${{color:"rgba(255,255,255,.8)",fontSize:10}}>กำลัง sync...</span>
        </div>`}
        ${!loading&&lastSync&&html`<div style=${{background:"rgba(255,255,255,.1)",borderRadius:10,padding:"5px 8px",display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
          <${Ico} name="refresh" size=${10} color="rgba(255,255,255,.7)"/>
          <span style=${{color:"rgba(255,255,255,.7)",fontSize:10}}>${lastSync}</span>
        </div>`}
      </div>
    </div>

    <!-- CONTENT -->
    <div style=${{padding:"14px 14px 80px"}}>
      ${tab==="book"  && html`<${BookingTab} apiUrl=${apiUrl} patients=${patients} bookings=${bookings} onAddBooking=${onAddBooking} onCancelBooking=${onDeleteBooking} slotCount=${slotCount} slotFull=${slotFull} onDone=${()=>setTab("book")} onRefreshBookings=${fetchBookings}/>`}
      ${tab==="list"  && (isAdmin?html`<${ListTab} bookings=${bookings} onDelete=${onDeleteBooking} onRefresh=${()=>fetchAll(true)} lastSync=${lastSync}/>`:html`<${LockedScreen}/>`)}
      ${tab==="stats" && (isAdmin?html`<${StatsTab} patients=${patients} bookings=${bookings} onRefresh=${()=>fetchAll(true)} lastSync=${lastSync}/>`:html`<${LockedScreen}/>`)}
      ${tab==="setup" && (isAdmin?html`<${SettingsScreen} onSave=${onSaveUrl}/>`:html`<${LockedScreen}/>`)}
    </div>

    <!-- BOTTOM NAV -->
    <nav style=${{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"white",borderTop:`1px solid ${C.border}`,boxShadow:"0 -4px 20px rgba(0,0,0,.08)",display:"flex",height:64,zIndex:100}}>
      ${TABS.map(t=>{const active=tab===t.id,locked=t.admin&&!isAdmin;
        return html`<button key=${t.id} onClick=${()=>{if(t.admin&&!isAdmin){setShowLogin(true);}else handleTabSwitch(t.id);}}
          style=${{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,background:"none",border:"none",cursor:"pointer",borderTop:`2.5px solid ${active?C.teal:"transparent"}`,position:"relative"}}>
          <${Ico} name=${t.icon} size=${22} color=${active?C.teal:locked?"#CBD5E1":C.textLt}/>
          <span style=${{fontSize:11,color:active?C.teal:locked?"#CBD5E1":C.textLt,fontWeight:active?700:400}}>${t.lbl}</span>
          ${locked&&html`<div style=${{position:"absolute",top:8,right:"50%",transform:"translateX(8px)",width:14,height:14,background:"#E2E8F0",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}><${Ico} name="lock" size=${8} color=${C.textLt}/></div>`}
        </button>`;
      })}
    </nav>

    ${showLogin&&html`<${AdminLogin} onLogin=${doLogin} onClose=${()=>setShowLogin(false)}/>`}
  </div>`;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
</script>
</body>
</html>
