  if(!p.screendate?.trim())return{ok:true,col:"green",reason:"ยังไม่เคยรับการตรวจ HPV Self-test",icon:"✓"};
  const last=parseBEDate(p.screendate);
  if(!last)return{ok:true,col:"green",reason:"ไม่มีข้อมูลการตรวจเดิม",icon:"✓"};
  const yrs=(NOW-last)/(365.25*24*3600*1000);
  if(yrs>=5)return{ok:true,col:"green",reason:`ครบ 5 ปีแล้ว (ตรวจล่าสุด ${fmtBE(last)})`,icon:"✓"};
  const next=new Date(last);next.setFullYear(next.getFullYear()+5);
  return{ok:false,col:"amber",reason:`ยังไม่ครบ 5 ปี · ตรวจล่าสุด ${fmtBE(last)} · ครั้งถัดไป ${fmtBE(next)}`,icon:"⏱"};
}
function parsePatients(){
  return PATIENT_RAW.trim().split("\n").map(line=>{
    const p=line.split("|");
    return{idcard:p[0]||"",title:p[1]||"",fname:p[2]||"",lname:p[3]||"",
           hno:p[4]||"",moo:(p[5]||"").padStart(2,"0"),
           age:parseInt(p[6])||0,right:p[7]||"",screendate:p[8]||"",method:p[9]||""};
  }).filter(p=>p.idcard&&p.idcard.length>=10&&p.fname);
}

      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        id:bk.id,name:`${bk.p.title} ${bk.p.fname} ${bk.p.lname}`,

    ${step===4&&conf&&html`<div class="fade-in">

        <div style=${{width:64,height:64,borderRadius:20,background:C.tealLt,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",fontSize:30,color:C.teal}}>✓</div>
        <div style=${{fontWeight:700,fontSize:18,color:C.textDk}}>จองคิวสำเร็จ</div>
        <div style=${{fontSize:13,color:C.textMd,marginTop:4}}>ระบบบันทึกการจองเรียบร้อยแล้ว</div>
        <div style=${{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:8,minHeight:22}}>
          ${sync==="ing"&&html`<><div style=${{width:14,height:14,border:`2px solid ${C.teal}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 1s linear infinite"}}/><span style=${{fontSize:12,color:C.textMd}}>บันทึกใน Google Sheets...</span></>`}
          ${sync==="ok"&&html`<span style=${{fontSize:12,color:C.teal,fontWeight:700}}>✓ บันทึกใน Google Sheets แล้ว</span>`}
          ${sync==="err"&&html`<span style=${{fontSize:12,color:C.amber}}>⚠ บันทึก Sheets ไม่สำเร็จ (เก็บในเครื่อง)</span>`}
        </div>
      </div>
      <div style=${card}>
        <div style=${{fontWeight:700,fontSize:14,color:C.textDk,marginBottom:12}}>รายละเอียดนัดหมาย</div>
        ${[
          {lbl:"ชื่อ-นามสกุล",val:`${conf.p.title} ${conf.p.fname} ${conf.p.lname}`},
          {lbl:"หมู่บ้าน",val:`${CONFIG.MOO[conf.p.moo]||conf.p.moo} บ้านเลขที่ ${conf.p.hno}`},
          {lbl:"วันที่",val:`วัน${conf.dayTh} ${conf.dateLabel}`},
          {lbl:"เวลา",val:`${conf.time} น.`},
          {lbl:"บริการ",val:"HPV Self-test"},
          ...(conf.note?[{lbl:"หมายเหตุ",val:conf.note}]:[]),
        ].map(f=>html`<div key=${f.lbl} style=${{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:`1px solid ${C.border}`}}>
          <span style=${{fontSize:12,color:C.textMd}}>${f.lbl}</span>
          <span style=${{fontSize:12,fontWeight:700,color:C.textDk,textAlign:"right",maxWidth:220}}>${f.val}</span>
        </div>`)}
      </div>
      <div style=${{background:C.tealLt,borderRadius:14,padding:"10px 14px",display:"flex",gap:8,alignItems:"flex-start",marginBottom:12}}>
        <${Ico} name="info" size=${16} color=${C.teal}/>
        <div style=${{fontSize:12,color:C.tealDk,lineHeight:1.6}}>นำบัตรประชาชนมาด้วย · หลีกเลี่ยงการสวนล้างช่องคลอดและมีเพศสัมพันธ์ก่อนตรวจ 48 ชั่วโมง</div>
      </div>
      <button onclick=${reset} style=${{width:"100%",background:C.teal,color:"white",border:"none",borderRadius:14,padding:"13px 0",fontSize:15,fontWeight:700}}>จองคิวรายใหม่</button>
    </div>`}
  </div>`;
}

// ============================================================
// LIST TAB (admin)
// ============================================================
function ListTab({bookings,removeBooking}){
  if(!bookings.length)return html`<div style=${{...card,textAlign:"center",padding:"48px 0",color:C.textLt}}>
    <${Ico} name="calendar" size=${40} color=${C.border}/>
    <div style=${{marginTop:12,fontSize:14}}>ยังไม่มีรายการจอง</div>
  </div>`;
  return html`<div class="fade-in">
    <div style=${{fontWeight:700,fontSize:16,color:C.textDk,marginBottom:12}}>รายการจองคิว (${bookings.length} ราย)</div>
    <div style=${{display:"flex",flexDirection:"column",gap:10}}>
      ${[...bookings].reverse().map(bk=>html`
      <div key=${bk.id} style=${{...card,marginBottom:0}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style=${{flex:1,minWidth:0}}>
            <div style=${{fontWeight:700,fontSize:14,color:C.textDk}}>${bk.p.title} ${bk.p.fname} ${bk.p.lname}</div>
            <div style=${{fontSize:11,color:C.textMd,marginTop:2}}>${CONFIG.MOO[bk.p.moo]||bk.p.moo} · ${bk.p.idcard}</div>
          </div>
          <button onclick=${()=>removeBooking(bk.id)} style=${{background:C.redLt,color:C.red,border:"none",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:700,flexShrink:0}}>ยกเลิก</button>
        </div>
        <div style=${{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
          <span style=${{fontSize:11,padding:"3px 8px",borderRadius:8,background:C.tealLt,color:C.teal,fontWeight:700}}>${bk.dateLabel} · ${bk.time} น.</span>
          <span style=${{fontSize:11,padding:"3px 8px",borderRadius:8,background:C.bg,color:C.textMd}}>HPV Self-test</span>
          ${bk.synced&&html`<span style=${{fontSize:11,padding:"3px 8px",borderRadius:8,background:C.greenLt,color:C.green,fontWeight:700}}>✓ Sheets</span>`}
          ${bk.note&&html`<span style=${{fontSize:11,color:C.textMd}}>📝 ${bk.note}</span>`}
        </div>
      </div>`)}
    </div>
  </div>`;
}

// ============================================================
// STATS TAB (admin)
// ============================================================
function StatsTab({bookings}){
  const screened=useMemo(()=>PATIENTS.filter(p=>p.screendate?.trim()).length,[]);
  const pct=Math.round(screened/PATIENTS.length*100);
  return html`<div class="fade-in">
    <div style=${card}>
      <div style=${{fontWeight:700,fontSize:15,color:C.textDk,marginBottom:14}}>ภาพรวมการคัดกรอง HPV</div>
      <div style=${{marginBottom:14}}>
        <div style=${{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <span style=${{fontSize:13,color:C.textMd}}>ตรวจแล้ว</span>
          <span style=${{fontSize:13,fontWeight:700,color:C.teal}}>${screened}/${PATIENTS.length} (${pct}%)</span>
        </div>
        <div style=${{height:12,background:C.bg,borderRadius:6,overflow:"hidden"}}>
          <div style=${{height:"100%",width:pct+"%",background:`linear-gradient(90deg,${C.teal},${C.tealMd})`,borderRadius:6}}/>
        </div>
      </div>
      <div style=${{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
        ${[
          {lbl:"เป้าหมาย",val:PATIENTS.length,col:C.textDk},
          {lbl:"ตรวจแล้ว",val:screened,col:C.teal},
          {lbl:"คงเหลือ",val:PATIENTS.length-screened,col:C.amber},
        ].map(c=>html`<div key=${c.lbl} style=${{background:C.bg,borderRadius:12,padding:"10px 8px",textAlign:"center"}}>
          <div style=${{fontSize:10,color:C.textLt,fontWeight:600}}>${c.lbl}</div>
          <div style=${{fontSize:26,fontWeight:700,color:c.col}}>${c.val}</div>
        </div>`)}
      </div>
    </div>
    <div style=${card}>
      <div style=${{fontWeight:700,fontSize:15,color:C.textDk,marginBottom:14}}>รายหมู่บ้าน</div>
      ${Object.entries(CONFIG.MOO).map(([moo,name])=>{
        const all=PATIENTS.filter(p=>p.moo===moo);
        const done=all.filter(p=>p.screendate?.trim());
        const p2=all.length?Math.round(done.length/all.length*100):0;
        const nd=all.length-done.length;
        return html`<div key=${moo} style=${{marginBottom:14}}>
          <div style=${{display:"flex",justifyContent:"space-between",marginBottom:5,alignItems:"center"}}>
            <div style=${{fontSize:13,fontWeight:600,color:C.textDk}}>${name}</div>
            <div style=${{display:"flex",gap:6,alignItems:"center"}}>
              <span style=${{fontSize:11,color:C.textMd}}>${done.length}/${all.length}</span>
              <span style=${{fontSize:10,padding:"2px 7px",borderRadius:8,
                background:nd>0?C.amberLt:C.greenLt,color:nd>0?C.amber:C.green,fontWeight:700}}>
                ${nd>0?"รอ "+nd:"ครบ ✓"}
              </span>
            </div>
          </div>
          <div style=${{height:8,background:C.bg,borderRadius:4,overflow:"hidden"}}>
            <div style=${{height:"100%",width:p2+"%",background:p2>=70?C.teal:p2>=40?C.tealMd:"#F59E0B",borderRadius:4}}/>
          </div>
        </div>`;
      })}
    </div>
    ${bookings.length>0&&(()=>{
      const byDate={};
      bookings.forEach(bk=>{byDate[bk.dk]=byDate[bk.dk]||{label:bk.dateLabel,day:bk.dayTh,items:[]};byDate[bk.dk].items.push(bk);});
      return html`<div style=${card}>
        <div style=${{fontWeight:700,fontSize:15,color:C.textDk,marginBottom:12}}>สรุปการจองคิว (${bookings.length} ราย)</div>
        ${Object.entries(byDate).sort((a,b)=>a[0].localeCompare(b[0])).map(([k,v])=>html`
        <div key=${k} style=${{marginBottom:12,paddingBottom:12,borderBottom:`1px solid ${C.border}`}}>
          <div style=${{fontWeight:700,fontSize:12,color:C.textDk,marginBottom:6}}>วัน${v.day} ${v.label} (${v.items.length} ราย)</div>
          <div style=${{display:"flex",gap:6,flexWrap:"wrap"}}>
            ${v.items.map(b=>html`<span key=${b.id} style=${{fontSize:11,padding:"3px 8px",borderRadius:8,background:C.tealLt,color:C.teal,fontWeight:600}}>${b.time} · ${b.p.fname}</span>`)}
          </div>
        </div>`)}
      </div>`;
    })()}
  </div>`;
}

// ============================================================
// LOCKED SCREEN
// ============================================================
function LockedScreen({onUnlock}){
  return html`<div style=${{textAlign:"center",padding:"60px 20px"}}>
    <div style=${{width:64,height:64,borderRadius:20,background:C.tealLt,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>
      <${Ico} name="lock" size=${28} color=${C.teal}/>
    </div>
    <div style=${{fontWeight:700,fontSize:16,color:C.textDk}}>สำหรับแอดมินเท่านั้น</div>
    <div style=${{fontSize:13,color:C.textMd,marginTop:6,marginBottom:20}}>กรุณาเข้าสู่ระบบเพื่อดูข้อมูลส่วนนี้</div>
    <button onclick=${onUnlock} style=${{background:C.teal,color:"white",border:"none",borderRadius:12,padding:"11px 28px",fontSize:14,fontWeight:700}}>เข้าสู่ระบบแอดมิน</button>
  </div>`;
}

// ============================================================
// MAIN APP
// ============================================================
function App(){
  const [tab,setTab]=useState("book");
  const [showLogin,setShowLogin]=useState(false);
  const [isAdmin,setIsAdmin]=useState(false);
  const [bookings,setBookings]=useState([]);
  const [slots,setSlots]=useState({});

  useEffect(()=>{
    try{
      const r=localStorage.getItem(ADMIN_KEY);
      if(r){const{expiry}=JSON.parse(r);if(Date.now()<expiry)setIsAdmin(true);else localStorage.removeItem(ADMIN_KEY);}
    }catch{}
    try{
      const r=localStorage.getItem(STORAGE_KEY);
      if(r){const b=JSON.parse(r);setBookings(b);rebuildSlots(b);}
    }catch{}
  },[]);

  function rebuildSlots(list){
    const s={};list.forEach(bk=>{const k=bk.dk+"_"+bk.time;s[k]=(s[k]||0)+1;});setSlots(s);
  }
  function saveBookings(list){setBookings(list);rebuildSlots(list);try{localStorage.setItem(STORAGE_KEY,JSON.stringify(list));}catch{}}
  function addBooking(bk){saveBookings([...bookings,bk]);}
  function removeBooking(id){saveBookings(bookings.filter(b=>b.id!==id));}
  function markSynced(id){saveBookings(bookings.map(b=>b.id===id?{...b,synced:true}:b));}
  function slotCount(dk,t){return slots[dk+"_"+t]||0;}
  function slotFull(dk,t,max){return slotCount(dk,t)>=max;}

  function doLogin(pin){
    if(pin===CONFIG.ADMIN_PIN){
      const expiry=Date.now()+SESSION_H*3600*1000;
      localStorage.setItem(ADMIN_KEY,JSON.stringify({expiry}));
      setIsAdmin(true);setShowLogin(false);return true;
    }
    return false;
  }
  function doLogout(){localStorage.removeItem(ADMIN_KEY);setIsAdmin(false);}

  const screened=useMemo(()=>PATIENTS.filter(p=>p.screendate?.trim()).length,[]);
  const TABS=[
    {id:"book",icon:"calendar",lbl:"จองคิว",admin:false},
    {id:"list",icon:"list",lbl:"รายการ",admin:true},
    {id:"stats",icon:"chart",lbl:"สถิติ",admin:true},
  ];

  return html`<div style=${{fontFamily:"inherit",background:C.bg,minHeight:"100vh"}}>
    <!-- HEADER -->
    <div style=${{background:`linear-gradient(135deg,${C.teal},${C.tealDk})`,padding:"14px 16px 14px",boxShadow:"0 2px 12px rgba(13,148,136,.3)",position:"sticky",top:0,zIndex:50}}>
      <div style=${{display:"flex",alignItems:"center",gap:10}}>
        <div style=${{width:38,height:38,borderRadius:12,background:"rgba(255,255,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <${Ico} name="shield" size=${20} color="white"/>
        </div>
        <div style=${{flex:1}}>
          <div style=${{color:"white",fontWeight:700,fontSize:15}}>HPV Self-test จองคิว</div>
          <div style=${{color:"rgba(255,255,255,.75)",fontSize:11}}>${CONFIG.CENTER_NAME}</div>
        </div>
        ${isAdmin
          ?html`<button onclick=${doLogout} style=${{background:"rgba(255,255,255,.15)",border:"none",borderRadius:10,padding:"6px 10px",display:"flex",alignItems:"center",gap:5,cursor:"pointer",color:"white",fontSize:12}}>
            <${Ico} name="logout" size=${14} color="white"/> ออก
          </button>`
          :html`<button onclick=${()=>setShowLogin(true)} style=${{background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.3)",borderRadius:10,padding:"6px 10px",display:"flex",alignItems:"center",gap:5,cursor:"pointer",color:"white",fontSize:12}}>
            <${Ico} name="lock" size=${14} color="white"/> แอดมิน
          </button>`
        }
      </div>
      <!-- SUMMARY CHIPS -->
      <div style=${{display:"flex",gap:8,marginTop:12,overflowX:"auto",paddingBottom:2}}>
        ${[
          {lbl:"เป้าหมาย",val:PATIENTS.length},
          {lbl:"ตรวจแล้ว",val:screened},
          {lbl:"คงเหลือ",val:PATIENTS.length-screened},
          {lbl:"จองคิว",val:bookings.length},
        ].map(c=>html`<div key=${c.lbl} style=${{background:"rgba(255,255,255,.15)",borderRadius:10,padding:"5px 12px",minWidth:70,textAlign:"center",flexShrink:0}}>
          <div style=${{color:"rgba(255,255,255,.75)",fontSize:10,fontWeight:600}}>${c.lbl}</div>
          <div style=${{color:"white",fontWeight:700,fontSize:20,lineHeight:1.2}}>${c.val}</div>
        </div>`)}
      </div>
    </div>

    <!-- CONTENT -->
    <div style=${{padding:"14px 14px 80px"}}>
      ${tab==="book"&&html`<${BookingTab} bookings=${bookings} slotCount=${slotCount} slotFull=${slotFull} addBooking=${addBooking} markSynced=${markSynced}/>`}
      ${tab==="list"&&(isAdmin?html`<${ListTab} bookings=${bookings} removeBooking=${removeBooking}/>`:html`<${LockedScreen} onUnlock=${()=>setShowLogin(true)}/>`)}
      ${tab==="stats"&&(isAdmin?html`<${StatsTab} bookings=${bookings}/>`:html`<${LockedScreen} onUnlock=${()=>setShowLogin(true)}/>`)}
    </div>

    <!-- BOTTOM NAV -->
    <nav style=${{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"white",borderTop:`1px solid ${C.border}`,boxShadow:"0 -4px 20px rgba(0,0,0,.08)",display:"flex",height:64,zIndex:100}}>
      ${TABS.map(t=>{
        const active=tab===t.id,locked=t.admin&&!isAdmin;
        return html`<button key=${t.id} onclick=${()=>{if(t.admin&&!isAdmin){setShowLogin(true);}else{setTab(t.id);}}}
          style=${{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,background:"none",border:"none",cursor:"pointer",
            borderTop:`2.5px solid ${active?C.teal:"transparent"}`,transition:"border-color .2s",position:"relative"}}>
          <${Ico} name=${t.icon} size=${22} color=${active?C.teal:locked?"#CBD5E1":C.textLt}/>
          <span style=${{fontSize:11,color:active?C.teal:locked?"#CBD5E1":C.textLt,fontWeight:active?700:400}}>${t.lbl}</span>
          ${locked&&html`<div style=${{position:"absolute",top:8,right:"50%",transform:"translateX(8px)",width:14,height:14,background:"#E2E8F0",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <${Ico} name="lock" size=${8} color=${C.textLt}/>
          </div>`}
        </button>`;
      })}
    </nav>

    ${showLogin&&html`<${AdminLogin} onLogin=${doLogin} onClose=${()=>setShowLogin(false)}/>`}
  </div>`;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
</script>
</body>
</html>
